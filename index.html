<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Djurgårdens IF</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1a56db;--dif:#005B9A;--accent:#f59e0b;--green:#10b981;--red:#ef4444;--gray:#6b7280;
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1f2937;--bg4:#374151;
  --surface:#151c2c;--surface2:#1a2236;
  --border:#1f2937;--border2:#2d3748;
  --text:#f9fafb;--text2:#9ca3af;--text3:#6b7280;
  --nav:60px;--safe:env(safe-area-inset-bottom,0px);
  --r:12px;--r2:8px;--r3:6px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}

html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:calc(var(--nav) + var(--safe));overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
img{display:block;max-width:100%}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;backdrop-filter:blur(12px)}
.topbar-logo{display:flex;align-items:center;gap:10px}
.logo-badge{width:32px;height:32px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 0 2px rgba(245,158,11,.5)}
.logo-badge b{font-size:9px;font-weight:800;color:#0a2447;line-height:1}
.logo-badge small{font-size:6px;color:#6b7280;letter-spacing:.5px}
.topbar-name{font-size:16px;font-weight:800;letter-spacing:-.3px}
.topbar-right{display:flex;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2);transition:background .15s}
.icon-btn:active{background:var(--bg4)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.2px;transition:color .15s;padding:8px 0;position:relative}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--dif)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:2px;background:var(--dif);border-radius:0 0 4px 4px}

/* PAGES */
.page{display:none;min-height:60vh}
.page.active{display:block}

/* ── HOME ── */
.hero-card{margin:12px;border-radius:var(--r);overflow:hidden;position:relative;background:var(--bg2);border:1px solid var(--border)}
/* Top strip: DIF blue left, opponent right */
.hero-split{display:grid;grid-template-columns:1fr 1fr;min-height:130px}
.hero-home{background:linear-gradient(135deg,#001e38 0%,#003060 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px 12px;position:relative}
.hero-away{background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px 12px;position:relative}
/* Center VS badge */
.hero-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;background:var(--bg2);border:2px solid var(--border);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--text2);letter-spacing:.5px}
.hero-team-logo{width:60px;height:60px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-team-logo img{width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.hero-team-ini{font-size:18px;font-weight:900;color:rgba(255,255,255,.5)}
.hero-team-name{font-size:13px;font-weight:700;color:#fff;text-align:center;line-height:1.2}
/* DIF highlight */
.hero-home::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--dif)}
/* Bottom meta bar */
.hero-meta{display:flex;align-items:center;justify-content:center;gap:0;border-top:1px solid var(--border)}
.hero-meta-item{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;font-size:11px;color:var(--text2);font-weight:500;border-right:1px solid var(--border)}
.hero-meta-item:last-child{border-right:none}
.hero-meta-item svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;opacity:.6}
/* Label pill */
.hero-label{position:absolute;top:10px;left:10px;background:var(--dif);color:#fff;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.hero-comp-pill{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.08);color:var(--text3);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px}

/* SECTION */
.section-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px}
.section-title{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;display:block}
.see-all{font-size:12px;color:var(--dif);font-weight:600;padding:4px 10px;background:rgba(0,91,154,.12);border-radius:20px}

/* RESULTS SCROLL */
/* ── RESULTS ROW (horizontal scroll) ─────────────────────────── */
.results-row{display:flex;gap:0;padding:0 12px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-direction:column}
.results-row::-webkit-scrollbar{display:none}

/* Each result as a horizontal row like FotMob/screenshot */
.result-chip{display:flex;align-items:center;gap:0;padding:10px 0;border-bottom:1px solid var(--border);position:relative;cursor:default}
.result-chip:last-child{border-bottom:none}

/* Result indicator on left */
.rc-indicator{width:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rc-ind-dot{width:8px;height:8px;border-radius:50%}
.result-chip.win .rc-ind-dot{background:var(--green)}
.result-chip.loss .rc-ind-dot{background:#f87171}
.result-chip.draw .rc-ind-dot{background:var(--text3)}

/* Teams + score row */
.rc-body{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.rc-team-side{flex:1;display:flex;align-items:center;gap:7px;min-width:0}
.rc-team-side.right{flex-direction:row-reverse;justify-content:flex-start}
.rc-logo{width:24px;height:24px;flex-shrink:0;object-fit:contain}
.rc-logo-ini{width:24px;height:24px;border-radius:4px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--text3);flex-shrink:0}
.rc-opp{font-size:13px;color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-dif{font-size:13px;font-weight:700;color:var(--text)}

/* Score in center */
.rc-score-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:52px}
.rc-score{font-size:15px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.result-chip.win .rc-score{color:var(--green)}
.result-chip.loss .rc-score{color:#f87171}
.rc-comp{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

/* Date on right */
.rc-date{width:46px;flex-shrink:0;font-size:10px;color:var(--text3);text-align:right;padding-right:4px;line-height:1.3}

/* MATCH CARD */
.match-card{background:var(--surface);border-radius:0;margin:0;border:none;border-bottom:1px solid var(--border);overflow:hidden;position:relative}
.match-card:last-child{border-bottom:none}
.match-card-bar{display:none}
.mc-top{display:flex;align-items:center;gap:8px;padding:9px 14px 6px}
.mc-comp{flex:1;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.mc-date{font-size:11px;color:var(--text3)}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.3px}
.badge-ft{background:var(--bg3);color:var(--text3)}
.badge-live{background:rgba(239,68,68,.15);color:#f87171;display:flex;align-items:center;gap:4px}
/* Hero live overlay */
.hero-live-banner{background:#ef4444;color:#fff;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;display:flex;align-items:center;justify-content:center;gap:7px}
.hero-live-score{font-family:monospace;font-size:15px;font-weight:900;letter-spacing:-0.5px;background:rgba(0,0,0,.2);padding:1px 8px;border-radius:4px}
.badge-ns{background:rgba(0,91,154,.15);color:#60a5fa}
.live-dot{width:6px;height:6px;border-radius:50%;background:#f87171;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.mc-teams{display:flex;align-items:center;gap:6px;padding:4px 14px 12px}
.mc-team{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.mc-team-r{flex-direction:row-reverse}
.mc-logo{width:30px;height:30px;border-radius:4px;background:transparent;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.mc-logo img{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.3))}
.mc-logo-ini{font-size:9px;font-weight:800;color:var(--text3);background:var(--bg3);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.mc-name{font-size:13px;color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-name.dif{color:var(--text);font-weight:700}
.mc-score{min-width:60px;text-align:center;flex-shrink:0}
.mc-score-val{font-size:22px;font-weight:800;letter-spacing:-1px}
.mc-score-val.win{color:var(--green)}
.mc-score-val.loss{color:var(--red)}
.mc-score-val.draw{color:var(--text2)}
.mc-time{font-size:18px;font-weight:700;color:var(--text)}
.mc-upcoming{text-align:center}
.mc-upcoming .mc-time{display:block;font-size:17px;font-weight:700}
.mc-upcoming .mc-soon{font-size:10px;color:var(--accent);margin-top:2px;font-weight:600}

/* NEWS TIMELINE */
.news-list-wrap{margin:0 12px 12px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}

/* Date group header */
.news-date-group{padding:10px 16px 6px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.news-date-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}
.news-date-count{font-size:10px;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:10px;font-weight:600}
.news-show-more{width:100%;padding:12px;border:none;background:transparent;color:var(--dif);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border-top:1px solid var(--border);transition:background .15s}
.news-show-more:hover{background:var(--bg3)}
.news-show-more svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;transition:transform .2s}
.news-show-more.loading svg{animation:spin .7s linear infinite}
.news-hidden{display:none}

/* Timeline item */
.news-item{display:flex;align-items:flex-start;gap:0;cursor:pointer;user-select:none;position:relative;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
/* The vertical timeline line */
.news-tl-left{width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:16px;position:relative}
.news-tl-left::before{content:'';position:absolute;top:0;bottom:0;left:25px;width:1px;background:var(--border);z-index:0}
.news-tl-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);border:2px solid var(--surface);flex-shrink:0;position:relative;z-index:1;transition:background .15s}
.news-item.expanded .news-tl-dot{background:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.news-tl-time{font-size:10px;font-weight:700;color:var(--text3);margin-top:5px;text-align:center;line-height:1.2;letter-spacing:.3px}

/* Item content */
.news-item-right{flex:1;min-width:0;padding:14px 14px 14px 0}
.news-item-src-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.news-item-ico{width:16px;height:16px;border-radius:3px;overflow:hidden;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center}
.news-item-ico img{width:16px;height:16px;object-fit:cover}
.news-src-name{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.news-item h4{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-item:hover .news-item-right{opacity:.85}
.news-chevron{color:var(--text3);font-size:16px;flex-shrink:0;transition:transform .2s;padding:14px 12px 0 0;align-self:flex-start}
.news-item.expanded .news-chevron{transform:rotate(90deg);color:var(--accent)}

/* Expanded drawer */
.news-drawer{display:none;padding:0 14px 16px 52px;border-bottom:1px solid var(--border);background:var(--bg3)}
.news-drawer.open{display:block;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.news-drawer-inner{border-left:2px solid var(--accent);padding-left:12px}
.news-drawer p{font-size:13px;color:var(--text2);line-height:1.7;margin:0 0 12px}
.news-read-more{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:white;background:var(--dif);padding:8px 16px;border-radius:20px;text-decoration:none;transition:background .15s}
.news-read-more:hover{background:#0070c0}
.news-read-more svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}

/* STANDINGS */
.table-wrap{margin:0 12px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.standings-tbl{width:100%;border-collapse:collapse;font-size:13px}
.standings-tbl th{padding:9px 8px;font-size:10px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);text-align:center;text-transform:uppercase;letter-spacing:.4px;background:var(--bg3)}
.standings-tbl th:nth-child(2){text-align:left;padding-left:4px}
.standings-tbl td{padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text2);text-align:center}
.standings-tbl td:nth-child(2){text-align:left;padding-left:4px}
.standings-tbl tr:last-child td{border-bottom:none}
.standings-tbl tr:hover td{background:var(--bg3)}
.standings-tbl tr.row-dif td{background:rgba(0,91,154,.1);color:var(--text);font-weight:700}
.pos-pill{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg4);color:var(--text3)}
.pos-top{background:rgba(245,158,11,.15);color:var(--accent)}
.pos-down{background:rgba(239,68,68,.12);color:#f87171}
.pos-playoff{background:rgba(251,146,60,.1);color:#fb923c}
.team-cell{display:flex;align-items:center;gap:6px}
.team-cell img{width:18px;height:18px;border-radius:2px;object-fit:contain;flex-shrink:0}
.tbl-legend{display:flex;gap:14px;padding:10px 12px;border-top:1px solid var(--border);background:var(--bg3)}
.tbl-leg-item{font-size:11px;color:var(--text3);padding-left:10px;position:relative}
.tbl-leg-item::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:12px;border-radius:2px}
.leg-eu::before{background:var(--accent)}
.leg-down::before{background:#f87171}
.hx{display:none}
@media(min-width:480px){.hx{display:table-cell}}

/* SQUAD */
.squad-filters{display:flex;gap:6px;padding:0 12px 12px;overflow-x:auto;scrollbar-width:none}
.squad-filters::-webkit-scrollbar{display:none}
.sq-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text2);white-space:nowrap;transition:all .15s}
.sq-chip.active{background:var(--dif);color:#fff;border-color:var(--dif)}
.pos-group-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 16px 6px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.player-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px}
@media(min-width:400px){.player-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:600px){.player-grid{grid-template-columns:repeat(5,1fr)}}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 8px 10px;text-align:center;position:relative;transition:transform .15s}
.player-card:active{transform:scale(.97)}
.fav-btn{position:absolute;top:6px;right:8px;font-size:14px;color:var(--text3);transition:color .15s}
.fav-btn.on{color:var(--accent)}
.pl-img{width:46px;height:46px;border-radius:50%;margin:0 auto 7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid var(--border2)}
.pl-img img{width:100%;height:100%;object-fit:cover}
.pl-ini{font-size:14px;font-weight:800;color:var(--text3)}
.pl-num{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:2px}
.pl-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3}
.pl-pos{font-size:10px;font-weight:600;margin-top:2px}
.pl-nat{font-size:10px;color:var(--text3);margin-top:1px}

/* SKELETON */
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
@keyframes shimmer{to{background-position:-200% 0}}
.sk-text{height:12px;border-radius:3px}
.sk-block{border-radius:var(--r2)}
.sk-circle{border-radius:50%}

/* MATCH TAB BAR */
.tab-bar{display:flex;gap:6px;padding:12px 12px 0;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text2);white-space:nowrap;transition:all .15s}
.tab-btn.active{background:var(--dif);color:#fff;border-color:var(--dif)}

/* EMPTY / ERROR */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:13px}

/* DESKTOP */
@media(min-width:760px){
  body{padding-bottom:0}
  .bottom-nav{display:none}
  .desktop-nav{display:flex !important;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px}
  .desktop-nav .nav-btn{flex:none;flex-direction:row;gap:6px;padding:12px 16px;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2)}
  .desktop-nav .nav-btn.active{color:var(--dif);border-bottom-color:var(--dif)}
  .desktop-nav .nav-btn::after{display:none}
  .desktop-nav .nav-btn svg{width:16px;height:16px}
  .page-wrap{max-width:1060px;margin:0 auto;display:grid;grid-template-columns:1fr 320px;gap:20px;padding:20px 20px}
  .main-col,.side-col{}
  .hero-card,.match-card,.news-feat,.news-list-wrap,.table-wrap{margin-left:0;margin-right:0}
  .player-grid{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-badge"><b>DIF</b><small>1891</small></div>
    <span class="topbar-name">Djurgårdens IF</span>
  </div>
  <div class="topbar-right">
  </div>
</header>

<!-- DESKTOP NAV -->
<nav class="desktop-nav" style="display:none">
  <button class="nav-btn active" onclick="nav('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Hem
  </button>
  <button class="nav-btn" onclick="nav('matches',this)">

<script>
// ── CONFIG ──────────────────────────────────────────────────
const TEAM_ID    = '134162';
const TSDB       = 'https://www.thesportsdb.com/api/v1/json/3';
const WORKER     = 'https://dif-proxy.r-robertjohansson.workers.dev';
const CACHE_TTL  = 3 * 60 * 1000; // 3 min – matches update fast after a game
const CACHE_VER  = 'v6'; // bump this to clear all caches

// Clear stale cache on version mismatch
if(localStorage.getItem('dif_cache_ver') !== CACHE_VER) {
  ['last','next','standings','news','squad'].forEach(k => localStorage.removeItem('c_'+k));
  localStorage.setItem('dif_cache_ver', CACHE_VER);
}

// ── STATE ────────────────────────────────────────────────────

// ── TEAM LOGOS ────────────────────────────────────────────────
// Klubbloggor – verifierade URLs
const TEAM_LOGOS = {
  // Verifierade TheSportsDB-badges
  'Djurgårdens IF':    'https://r2.thesportsdb.com/images/media/team/badge/nxiwwo1717762932.png',

  'AIK':               'https://r2.thesportsdb.com/images/media/team/badge/p7r6ou1542132891.png',
  // Officiella klubbloggor via favicon-tjänst (64px, alltid tillgänglig)

  'IF Elfsborg':       'https://www.google.com/s2/favicons?domain=elfsborg.se&sz=128',
  'Elfsborg':          'https://www.google.com/s2/favicons?domain=elfsborg.se&sz=128',
  'BK Häcken':         'https://www.google.com/s2/favicons?domain=bkhacken.se&sz=128',

  'Örgryte IS':        'https://www.google.com/s2/favicons?domain=orgryteis.se&sz=128',
  'Degerfors IF':      'https://www.google.com/s2/favicons?domain=degerforsif.se&sz=128',
  'IF Brommapojkarna': 'https://www.google.com/s2/favicons?domain=brommapojkarna.se&sz=128',
  'Brommapojkarna':    'https://www.google.com/s2/favicons?domain=brommapojkarna.se&sz=128',

  'IFK Skövde':        'https://www.google.com/s2/favicons?domain=ifkskovde.se&sz=128',
};

function teamLogo(name) {
  if (!name) return '';
  if (TEAM_LOGOS[name]) return TEAM_LOGOS[name];
  for (const [key, url] of Object.entries(TEAM_LOGOS)) {
    if (name.toLowerCase().includes(key.toLowerCase()) ||
        key.toLowerCase().includes(name.toLowerCase())) return url;
  }
  return '';
}

let S = {

  tab: 'home',
  matchTab: 'upcoming',
  squadFilter: 'all',
  last: [], next: [], standings: [], squad: [], news: [],
  favs: JSON.parse(localStorage.getItem('dif_favs')||'[]'),
  loaded: {},
};



// ── CACHE ────────────────────────────────────────────────────
function cGet(k){ try{ const d=JSON.parse(localStorage.getItem('c_'+k)||'null'); if(!d||Date.now()-d.t>=CACHE_TTL) return null; if(Array.isArray(d.v)&&!d.v.length) return null; return d.v; }catch(e){return null} }
function cSet(k,v){ try{ if(Array.isArray(v)&&!v.length) return; localStorage.setItem('c_'+k,JSON.stringify({v,t:Date.now()})); }catch(e){} }
function cClear(k){ try{ localStorage.removeItem('c_'+k); }catch(e){} }

// ── FETCH ────────────────────────────────────────────────────
async function apiFetch(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function getLastMatches(){
  const c = cGet('last');
  // Check if there's a pending match that should now be a result
  const hasPending = c&&c.length&&c.some(m=>m.status==='NS'&&new Date(m.date)<new Date(Date.now()-3*60*60*1000));
  if(c&&c.length&&!hasPending) return c;
  if(hasPending){ cClear('last'); console.log('Cache cleared: match should have result now'); }
  let live = [];
  try {
    const j = await apiFetch(`${TSDB}/eventslast.php?id=${TEAM_ID}`);
    live = (j.results||[]).map(normalizeMatch).filter(Boolean);
  } catch(e){ console.warn('TheSportsDB last:', e.message); }
  const liveDates = new Set(live.map(m=>m.date));
  const extra = FALLBACK_LAST.filter(m=>!liveDates.has(m.date));
  const merged = [...live, ...extra].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  if(merged.length) cSet('last', merged);
  return merged.length ? merged : FALLBACK_LAST;
}
async function getNextMatches(){
  // Invalidate cache if first match is in the past (game has been played)
  const c = cGet('next');
  if(c&&c.length){
    const firstDate = new Date(c[0].date);
    const isPast = firstDate < new Date(Date.now() - 2*60*60*1000); // 2h buffer after kickoff
    if(!isPast) return c;
    cClear('next'); // stale – refetch
    console.log('Cache cleared: next match is in the past');
  }
  let live = [];
  try {
    const j = await apiFetch(`${TSDB}/eventsnext.php?id=${TEAM_ID}`);
    live = (j.events||[]).map(normalizeMatch).filter(Boolean);
  } catch(e){ console.warn('TheSportsDB next:', e.message); }
  // Only keep future matches
  const now = new Date();
  const future = live.filter(m=>new Date(m.date) > new Date(now - 2*60*60*1000));
  // Merge with fallback
  const liveDates = new Set(future.map(m=>m.date));
  const extra = FALLBACK_NEXT.filter(m=>!liveDates.has(m.date) && new Date(m.date) > now);
  const merged = [...future, ...extra].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,8);
  if(merged.length) cSet('next', merged);
  return merged.length ? merged : FALLBACK_NEXT.filter(m=>new Date(m.date)>now);
}
async function getStandings(){
  const c = cGet('standings');
  if(c && c.length >= 10) return c;
  try {
    // Try Worker first (has its own cache)
    const j = await apiFetch(`${WORKER}/standings`);
    const v = j.table||[];
    if(v.length >= 10){ cSet('standings',v); return v; }
  } catch(e){ console.warn('Worker standings:', e.message); }
  try {
    // Fallback: hit TheSportsDB directly
    const j = await apiFetch(`${TSDB}/lookuptable.php?l=4347&s=2026`);
    const v = j.table||[];
    if(v.length >= 10){ cSet('standings',v); return v; }
  } catch(e){ console.warn('Direct standings:', e.message); }
  return FALLBACK_TABLE;
}
async function getSquad(){
  const c = cGet('squad'); if(c) return c;
  try{
    const j = await apiFetch(`${TSDB}/lookup_all_players.php?id=${TEAM_ID}`);
    if(j.player?.length){
      const v = j.player.map(p=>({id:p.idPlayer,name:p.strPlayer,pos:p.strPosition||'',nat:p.strNationality||'',num:p.strNumber||'?',img:p.strThumb||p.strCutout||''}));
      cSet('squad',v); return v;
    }
  }catch(e){}
  return FALLBACK_SQUAD;
}
async function getNews(){
  // Load historical archive from localStorage (persists across sessions)
  let archive = [];
  try {
    archive = JSON.parse(localStorage.getItem('dif_news_archive')||'[]');
  } catch(e){}

  // Fetch fresh articles
  let fresh = [];
  try {
    const j = await apiFetch(`${WORKER}/news`);
    fresh = (j.items||[]).filter(n=>n&&n.title);
  } catch(e){ console.warn('getNews failed:', e.message); }

  if(!fresh.length && archive.length) return archive;
  if(!fresh.length) return [];

  // Merge fresh into archive – deduplicate by title, keep newest 100
  const seen = new Set(fresh.map(n=>n.title.slice(0,50).toLowerCase()));
  const older = archive.filter(n=>!seen.has(n.title.slice(0,50).toLowerCase()));
  const merged = [...fresh, ...older]
    .sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))
    .slice(0,100);

  try { localStorage.setItem('dif_news_archive', JSON.stringify(merged)); } catch(e){}
  return merged;
}

function normalizeMatch(e){
  const DIF_NAMES = ['Djurgårdens IF','Djurgarden','Djurgaarden','DIF','Djurgårdens IF Fotboll'];
  const isHome = e.idHomeTeam===TEAM_ID || DIF_NAMES.some(n=>e.strHomeTeam===n);
  const isDIF = isHome || DIF_NAMES.some(n=>e.strAwayTeam===n);
  if(!isDIF) return null; // skip non-DIF matches
  const hs = e.intHomeScore!=null?+e.intHomeScore:null;
  const as = e.intAwayScore!=null?+e.intAwayScore:null;
  const ds = isHome?hs:as, os = isHome?as:hs;
  let result='upcoming';
  if(ds!=null&&os!=null){ result = ds>os?'win':ds<os?'loss':'draw'; }
  const liveStatuses = ['In Progress','HT','Live','1H','2H','ET','PEN'];
  const isLive = liveStatuses.some(s=>e.strStatus?.includes(s));
  const status = e.strStatus==='Match Finished'?'FT':isLive?'LIVE':'NS';
  return {
    id:e.idEvent, date:e.dateEvent, time:(e.strTime||'').slice(0,5),
    home:e.strHomeTeam, away:e.strAwayTeam,
    hl:e.strHomeTeamBadge||teamLogo(e.strHomeTeam)||'',
    al:e.strAwayTeamBadge||teamLogo(e.strAwayTeam)||'',
    hs, as, ds, os, isHome,
    opponent:isHome?e.strAwayTeam:e.strHomeTeam,
    oppLogo:isHome?e.strAwayTeamBadge:e.strHomeTeamBadge,
    competition:e.strLeague||'', venue:e.strVenue||'',
    status, result,
  };
}

// ── NAV ──────────────────────────────────────────────────────
function nav(tab, el){
  S.tab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+tab)?.classList.add('active');
  // Update all nav buttons
  document.querySelectorAll('.nav-btn').forEach(b=>{
    const match = b.getAttribute('onclick')?.includes("'"+tab+"'");
    b.classList.toggle('active', !!match);
  });
  window.scrollTo({top:0,behavior:'smooth'});
  if(tab==='home') loadHome();
  if(tab==='matches') loadMatches();
  if(tab==='squad') loadSquad();
  if(tab==='standings') loadStandings();
}

// ── UTILS ────────────────────────────────────────────────────
function fd(s){
  if(!s) return '';
  const d=new Date(s);
  return d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'});
}
function timeAgo(s){
  const diff=Date.now()-new Date(s).getTime();
  const m=Math.floor(diff/60000);
  if(m<1) return 'Nu'; if(m<60) return m+'m';
  const h=Math.floor(m/60);
  if(h<24) return h+'h'; return Math.floor(h/24)+'d';
}
function ini(name){ return (name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function logoImg(url,name,sz=26){
  if(url) return `<img src="${url}" width="${sz}" height="${sz}" loading="lazy" onerror="this.style.display='none'" alt="${name}">`;
  return `<span class="mc-logo-ini">${ini(name)}</span>`;
}
function daysUntil(d){
  const diff=new Date(d)-new Date(); const days=Math.ceil(diff/86400000);
  if(days<=0) return 'Idag'; if(days===1) return 'Imorgon'; return 'Om '+days+'d';
}

// ── SKELETON ─────────────────────────────────────────────────
function skelMatchCard(){
  return `<div class="match-card" style="padding:12px">
    <div style="display:flex;gap:8px;align-items:center">

// ── RENDER HERO ───────────────────────────────────────────────

function stripHTML(s){
  return (s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ')
    .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();
}

function mkLogo(name){
  const url = teamLogo(name);
  if(url) return `<img class="rc-logo" src="${url}" alt="${name}" loading="lazy" onerror="this.outerHTML='<span class=rc-logo-ini>${ini(name)}</span>'">`;
  return `<span class="rc-logo-ini">${ini(name)}</span>`;
}

function renderResultChips(matches){
  if(!matches.length) return '<div style="padding:1rem;color:var(--text3);font-size:13px;text-align:center">–</div>';
  return matches.map(m=>{
    const compShort = m.competition==='Allsvenskan'?'ALL':m.competition==='Svenska Cupen'?'CUP':'VÄN';
    return `
    <div class="result-chip ${m.result}">
      <div class="rc-indicator"><div class="rc-ind-dot"></div></div>
      <div class="rc-body">
        <div class="rc-team-side">
          ${mkLogo(m.home)}
          <span class="${m.isHome?'rc-dif':'rc-opp'}">${m.home}</span>
        </div>
        <div class="rc-score-wrap">
          <span class="rc-score">${m.ds}–${m.os}</span>
          <span class="rc-comp">${compShort}</span>
        </div>
        <div class="rc-team-side right">
          <span class="${!m.isHome?'rc-dif':'rc-opp'}">${m.away}</span>
          ${mkLogo(m.away)}
        </div>
      </div>
      <div class="rc-date">${fd(m.date)}</div>
    </div>`;
  }).join('');
}

function renderHero(m){
  const d = new Date(m.date);
  const ds = d.toLocaleDateString('sv-SE',{weekday:'short',day:'numeric',month:'short'});
  const homeLogo = m.hl||teamLogo(m.home);

    ? `<img src="${homeLogo}" loading="lazy" alt="${m.home}" onerror="this.outerHTML='<span class=hero-team-ini>${ini(m.home)}</span>'">`
    : `<span class="hero-team-ini">${ini(m.home)}</span>`;
  const awayPic = awayLogo
    ? `<img src="${awayLogo}" loading="lazy" alt="${m.away}" onerror="this.outerHTML='<span class=hero-team-ini>${ini(m.away)}</span>'">`
    : `<span class="hero-team-ini">${ini(m.away)}</span>`;
  const isLive = m.status === 'LIVE';
  const headerLabel = isLive ? 'Pågår nu' : 'Nästa match';
  return `
  <div class="hero-card">
    ${isLive ? `<div class="hero-live-banner">
      <span class="live-dot"></span>LIVE
      <span class="hero-live-score">${m.hs}–${m.as}</span>
    </div>` : ''}
    <div class="hero-split">
      <div class="hero-home" ${isLive?'style="border-bottom:2px solid #ef4444"':''}>

        <span class="hero-team-name">${m.home}</span>
      </div>

        <span class="hero-team-name">${m.away}</span>

      <div class="hero-center" ${isLive?'style="background:#ef4444;border-color:#ef4444;color:#fff;font-size:11px"':''}>${isLive?`${m.hs}–${m.as}`:'VS'}</div>
    </div>
    <div class="hero-meta">
      <div class="hero-meta-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${ds}
      </div>
      <div class="hero-meta-item" ${isLive?'style="color:#f87171;font-weight:700"':''}>
        ${isLive
          ? `<span class="live-dot"></span>Pågår`
          : `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${m.time||'TBD'}`}
      </div>
      ${m.venue?`<div class="hero-meta-item">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${m.venue.split(' ')[0]}
      </div>`:''}
    </div>
  </div>`;
}

// ── RENDER MATCH CARD ─────────────────────────────────────────
function renderMatchCard(m){
  const badge = m.status==='FT'
    ? `<span class="badge badge-ft">FT</span>`
    : m.status==='LIVE'
    ? `<span class="badge badge-live"><span class="live-dot"></span>LIVE</span>`
    : `<span class="badge badge-ns">${m.time||'–'}</span>`;

  const center = m.status==='FT'
    ? `<div class="mc-score"><span class="mc-score-val ${m.result}">${m.hs}–${m.as}</span></div>`
    : m.status==='LIVE'
    ? `<div class="mc-score">
        <span class="mc-score-val" style="color:#f87171">${m.hs}–${m.as}</span>
        <div style="font-size:9px;color:#f87171;font-weight:800;letter-spacing:.8px;margin-top:2px;display:flex;align-items:center;gap:3px"><span class="live-dot" style="width:5px;height:5px"></span>LIVE</div>
       </div>`
    : `<div class="mc-upcoming">
        <span class="mc-time">${m.time||'–'}</span>
        <div class="mc-soon">${daysUntil(m.date)}</div>
       </div>`;

  const bar = m.status==='FT' ? `<div class="match-card-bar ${m.result}"></div>` : '<div class="match-card-bar"></div>';

  return `
  <div class="match-card">
    ${bar}
    <div class="mc-top">
      <span class="mc-comp">${m.competition}</span>
      ${badge}
      <span class="mc-date">${fd(m.date)}</span>
    </div>
    <div class="mc-teams">
      <div class="mc-team">
        <div class="mc-logo">${logoImg(m.hl,m.home)}</div>
        <span class="mc-name ${m.isHome?'dif':''}">${m.home}</span>
      </div>
      ${center}
      <div class="mc-team mc-team-r">
        <span class="mc-name ${!m.isHome?'dif':''}">${m.away}</span>
        <div class="mc-logo">${logoImg(m.al,m.away)}</div>
      </div>
    </div>
  </div>`;
}

// ── RENDER STANDINGS ──────────────────────────────────────────
function renderStandings(table, limit=999){
  if(!table?.length) return '<div class="empty">Tabell ej tillgänglig</div>';
  const rows = table.slice(0,limit).map((t,i)=>{
    const pos = +t.intRank||i+1;
    const isDif = /djurgård/i.test(t.strTeam||'');
    const pc = pos<=3?'pos-top':pos>=15?'pos-down':pos>=13?'pos-playoff':'';
    return `<tr class="${isDif?'row-dif':''}">
      <td><span class="pos-pill ${pc}">${pos}</span></td>
      <td><div class="team-cell">${t.strTeamBadge?`<img src="${t.strTeamBadge}" loading="lazy" onerror="this.style.display='none'">`:''}
        <span>${isDif?`<strong>${t.strTeam}</strong>`:t.strTeam}</span></div></td>
      <td>${t.intPlayed||0}</td>
      <td class="hx">${t.intWin||0}</td>
      <td class="hx">${t.intDraw||0}</td>
      <td class="hx">${t.intLoss||0}</td>
      <td><strong>${t.intPoints||0}</strong></td>
    </tr>`;
  }).join('');
  return `<table class="standings-tbl">
    <thead><tr><th>#</th><th>Lag</th><th>M</th><th class="hx">V</th><th class="hx">O</th><th class="hx">F</th><th>P</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="tbl-legend">
    <span class="tbl-leg-item leg-eu">Europaplats</span>
    <span class="tbl-leg-item leg-down">Nedflyttning</span>
  </div>`;
}

// ── RENDER NEWS TIMELINE ─────────────────────────────────────
let _newsOpen = null;

function parseDate(s){
  if(!s) return null;
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}
function fmtNewsTime(s){
  const d = parseDate(s);
  if(!d) return '';
  return d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
}
function fmtNewsDate(s){
  const d = parseDate(s);
  if(!d) return 'Idag';
  const today = new Date();
  const yest = new Date(today); yest.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'Idag';
  if(d.toDateString()===yest.toDateString()) return 'Igår';
  return d.toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long'});
}

const PAGE_SIZE = 5;

function renderNewsList(items){
  if(!items||!items.length) return '<div style="padding:1.5rem;text-align:center;color:var(--text3);font-size:13px">Inga nyheter just nu</div>';
  const groups={}, todayKey=new Date().toDateString();
  items.forEach((n,i)=>{
    const d=parseDate(n.date);
    const key=d?d.toDateString():todayKey;
    if(!groups[key]) groups[key]={label:fmtNewsDate(n.date),items:[],ts:d?d.getTime():Date.now()};
    groups[key].items.push({n,i});
  });
  return Object.values(groups).sort((a,b)=>b.ts-a.ts).map((g,gi)=>{
    const gid='ng'+gi;
    const visible=g.items.slice(0,PAGE_SIZE);
    const hidden=g.items.slice(PAGE_SIZE);
    const total=g.items.length;
    return `
    <div class="news-date-group">
      <span class="news-date-label">${g.label}</span>
      <span class="news-date-count">${total} ${total===1?'artikel':'artiklar'}</span>
    </div>
    ${visible.map(({n,i})=>renderNewsItem(n,i)).join('')}
    ${hidden.length ? `
      <div id="${gid}-hidden" class="news-hidden">
        ${hidden.map(({n,i})=>renderNewsItem(n,i)).join('')}
      </div>
      <button class="news-show-more" id="${gid}-btn" onclick="showMoreNews('${gid}',${hidden.length},${total})">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        Visa ${hidden.length} till
      </button>
    ` : ''}
  `;
  }).join('');
}

function showMoreNews(gid, remaining, total){
  const hidden=document.getElementById(gid+'-hidden');
  const btn=document.getElementById(gid+'-btn');
  if(!hidden||!btn) return;
  hidden.classList.remove('news-hidden');
  btn.remove();
}

function renderNewsFeat(n,idx){ return renderNewsItem(n,idx||0); }

function renderNewsItem(n,idx){
  if(!n||!n.title) return '';
  const id='ni'+(idx||0);
  const summary=stripHTML(n.summary||n.description||'').slice(0,300);
  const hasDrawer=summary.length>20;
  const ico=n.fav
    ?`<div class="news-item-ico"><img src="${n.fav}" loading="lazy" onerror="this.style.display='none'" alt=""></div>`
    :`<div class="news-item-ico" style="background:${n.scolor||'#005B9A'}"></div>`;
  return `<div class="news-item" id="${id}" onclick="toggleNews('${id}','${(n.link||'').replace(/'/g,"\'").replace(/"/g,'&quot;')}',${hasDrawer})">
    <div class="news-tl-left">
      <div class="news-tl-dot"></div>
      <div class="news-tl-time">${fmtNewsTime(n.date)}</div>
    </div>
    <div class="news-item-right">
      <div class="news-item-src-row">${ico}<span class="news-src-name">${n.sname||''}</span></div>
      <h4>${stripHTML(n.title)}</h4>
    </div>
    <span class="news-chevron">${hasDrawer?'›':''}</span>
  </div>${hasDrawer?`<div class="news-drawer" id="${id}d">
    <div class="news-drawer-inner">
      <p>${summary}${summary.length>=300?'…':''}</p>
      <a class="news-read-more" href="${n.link||'#'}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        Läs hela artikeln ↗
      </a>
    </div>
  </div>`:''}`;
}

function toggleNews(id,link,hasDrawer){
  if(!hasDrawer){window.open(link,'_blank','noopener');return;}
  const item=document.getElementById(id);
  const drawer=document.getElementById(id+'d');
  if(!item||!drawer) return;
  const isOpen=drawer.classList.contains('open');
  if(_newsOpen&&_newsOpen!==id){
    const pi=document.getElementById(_newsOpen),pd=document.getElementById(_newsOpen+'d');
    if(pi) pi.classList.remove('expanded');
    if(pd) pd.classList.remove('open');
  }
  item.classList.toggle('expanded',!isOpen);
  drawer.classList.toggle('open',!isOpen);
  _newsOpen=!isOpen?id:null;
  if(!isOpen) setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

async function loadHome(){
  // Show fallback content IMMEDIATELY – don't wait for APIs
  S.last = S.last.length ? S.last : FALLBACK_LAST;
  S.next = S.next.length ? S.next : FALLBACK_NEXT;
  set('home-hero', renderHero(S.next[0]));
  set('home-results', renderResultChips(S.last.slice(0,5)));
  set('home-news-list','<div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div class="sk sk-text" style="width:80%"></div></div><div style="padding:14px 16px"><div class="sk sk-text" style="width:65%"></div></div>');
  set('home-table','<div style="padding:1rem 16px"><div class="sk sk-text" style="width:50%;margin-bottom:10px"></div><div class="sk sk-text" style="width:70%;margin-bottom:8px"></div><div class="sk sk-text" style="width:60%"></div></div>');

  // Then fetch live data in background – each independently
  try {
    const [last, next] = await Promise.all([getLastMatches(), getNextMatches()]);
    if(last.length){ S.last = last;
      set('home-results', renderResultChips(last.slice(0,5)));
    }
    if(next.length){ S.next = next; set('home-hero', renderHero(next[0])); }
  } catch(e){ console.warn('Matches:', e.message); }

  try {
    const news = await getNews();
    S.news = news;
    set('home-news-feat', '');
    set('home-news-list', renderNewsList(news.slice(0,15)));
  } catch(e){
    console.warn('News render error:', e.message);
    set('home-news-list','<div style="padding:1.5rem;text-align:center;color:var(--text3);font-size:13px">Kunde inte ladda nyheter</div>');
  }

  try {
    const table = await getStandings();
    S.standings = table;
    set('home-table', renderStandings(table));
  } catch(e){ console.warn('Standings:', e.message); }

}

async function loadMatches(){
  // Show fallback immediately
  if(!S.last.length) S.last = FALLBACK_LAST;
  if(!S.next.length) S.next = FALLBACK_NEXT;
  renderMatchesView();
  // Then try to update with live data
  try{
    const [last,next] = await Promise.all([getLastMatches(), getNextMatches()]);
    if(last.length) S.last=last;
    if(next.length) S.next=next;
    renderMatchesView();
  }catch(e){ console.warn('loadMatches:', e.message); }
}

function renderMatchesView(){
  const list = S.matchTab==='upcoming' ? S.next : S.last;
  set('matches-list', list.length ? list.map(renderMatchCard).join('') : `<div class="empty">Inga ${S.matchTab==='upcoming'?'kommande':'spelade'} matcher</div>`);
}

function switchMatchTab(tab, el){
  S.matchTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

}

async function loadSquad(){
  if(S.squad.length){ renderSquadView(S.squad, S.squadFilter); return; }
  set('squad-grid','<div class="player-grid">'+Array(8).fill('<div class="sk sk-block" style="height:130px;border-radius:var(--r2)"></div>').join('')+'</div>');
  try{
    S.squad = await getSquad();
    renderSquadView(S.squad, S.squadFilter);
  }catch(e){ set('squad-grid','<div class="empty">Kunde inte ladda truppen</div>'); }
}

function renderSquadView(players, filter){
  S.squadFilter = filter;
  document.querySelectorAll('.sq-chip').forEach(c=>c.classList.toggle('active', c.getAttribute('onclick')?.includes("'"+filter+"'")));
  const filtered = filter==='all' ? players : players.filter(p=>p.pos?.includes(filter));
  if(filter==='all'){
    const groups = {Goalkeeper:[],Defender:[],Midfielder:[],Forward:[]};
    filtered.forEach(p=>{ const k=Object.keys(groups).find(k=>p.pos?.includes(k)); if(k) groups[k].push(p); });
    const labels = {Goalkeeper:'Målvakter',Defender:'Backar',Midfielder:'Mittfältare',Forward:'Forwards'};
    set('squad-grid', Object.entries(groups).filter(([,v])=>v.length).map(([k,v])=>
      `<div class="pos-group-label">${labels[k]} (${v.length})</div><div class="player-grid">${v.map(renderPlayer).join('')}</div>`
    ).join(''));
  } else {
    set('squad-grid', `<div class="player-grid">${filtered.map(renderPlayer).join('')}</div>`);
  }
}

function filterSquad(f,el){ renderSquadView(S.squad.length?S.squad:[], f); loadSquad(); }

async function loadStandings(){
  if(!S.standings.length) S.standings = FALLBACK_TABLE;
  set('standings-full', renderStandings(S.standings));
  set('home-table', renderStandings(S.standings));
  try{
    const t = await getStandings();
    if(t.length){ S.standings=t; set('standings-full', renderStandings(t)); }
  }catch(e){ 
    if(!S.standings.length) set('standings-full','<div class="empty">Kunde inte ladda tabell</div>');
  }
}

function toggleFav(id, btn){
  const idx = S.favs.indexOf(id);
  if(idx===-1) S.favs.push(id); else S.favs.splice(idx,1);
  localStorage.setItem('dif_favs', JSON.stringify(S.favs));
  btn.classList.toggle('on', S.favs.includes(id));
}
