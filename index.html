<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Football</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060A12;--bg2:#0A1020;--bg3:#0D1628;--bg4:#141e30;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#E8EDF5;--text2:rgba(232,237,245,.72);--text3:rgba(232,237,245,.33);
  --dif:#003D7A;--dif2:#0066CC;--gold:#F5C842;--green:#10B981;--red:#EF4444;
  --r:12px;--r2:8px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--display:'Bebas Neue',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,61,122,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,61,122,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:500px;height:320px;background:radial-gradient(ellipse,rgba(0,40,100,.22) 0%,transparent 70%);pointer-events:none;z-index:0}

/* ── VIEWS ── */
.view{display:none;min-height:100vh;position:relative;z-index:1}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .25s ease both}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.sk-t{height:12px;border-radius:4px;margin-bottom:8px}
.sk-b{border-radius:var(--r2)}
.empty{padding:1.5rem;text-align:center;color:var(--text3);font-size:13px}

/* ══════════════ LANDING ══════════════ */
#vLanding{background:var(--bg)}
.land-header{padding:20px 18px 14px;display:flex;align-items:center;gap:10px}
.land-logo{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--dif),var(--dif2));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:15px;color:#fff;border:1.5px solid rgba(255,255,255,.15);box-shadow:0 0 20px rgba(0,61,122,.45);flex-shrink:0}
.land-title{font-family:var(--display);font-size:28px;letter-spacing:3px;background:linear-gradient(90deg,#fff,rgba(255,255,255,.65));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* DIF featured card */
.land-section{padding:0 16px 18px}
.land-divider{font-family:var(--display);font-size:11px;letter-spacing:2.5px;color:var(--text3);display:flex;align-items:center;gap:10px;margin-bottom:10px}
.land-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.feat-card{display:flex;align-items:center;gap:14px;padding:15px 16px;background:linear-gradient(135deg,rgba(0,25,50,.95) 0%,rgba(0,48,100,.55) 100%);border:1px solid rgba(0,102,204,.28);border-radius:var(--r);cursor:pointer;transition:border-color .2s,transform .12s;position:relative;overflow:hidden}
.feat-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0 50%,rgba(0,61,122,.22) 0%,transparent 60%);pointer-events:none}
.feat-card:active{transform:scale(.985)}
.feat-card:hover{border-color:rgba(0,102,204,.55)}
.feat-logo{width:54px;height:54px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.feat-info{flex:1;min-width:0}
.feat-tag{font-size:9px;font-weight:700;color:rgba(0,153,255,.65);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px}
.feat-name{font-family:var(--display);font-size:22px;letter-spacing:1.5px;color:#fff;line-height:1}
.feat-sub{font-size:11px;color:rgba(255,255,255,.38);margin-top:3px}
.feat-arrow{color:rgba(255,255,255,.18);font-size:22px;flex-shrink:0}

/* League grid */
.leagues-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.league-card{padding:13px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px}
.league-card:active{transform:scale(.97)}
.league-card:hover{background:rgba(255,255,255,.065);border-color:var(--border2)}
.lg-flag{font-size:22px;flex-shrink:0;line-height:1}
.lg-info{min-width:0}
.lg-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lg-country{font-size:10px;color:var(--text3);margin-top:1px}

/* ══════════════ TEAMS ══════════════ */
#vTeams{background:var(--bg)}
.page-hd{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(6,10,18,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;flex-shrink:0;font-size:18px;transition:background .15s;user-select:none}
.back-btn:hover{background:rgba(255,255,255,.1)}
.phd-flag{font-size:20px;flex-shrink:0}
.phd-title{font-family:var(--display);font-size:20px;letter-spacing:2px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.teams-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px}
.team-card{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 8px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .18s;text-align:center}
.team-card:active{transform:scale(.95)}
.team-card:hover{background:rgba(255,255,255,.07);border-color:var(--border2)}
.team-card.loading{cursor:default;pointer-events:none}
.tc-wrap{width:50px;height:50px;display:flex;align-items:center;justify-content:center}
.tc-wrap img{width:50px;height:50px;object-fit:contain;filter:drop-shadow(0 1px 5px rgba(0,0,0,.4))}
.tc-ini{font-family:var(--display);font-size:17px;color:var(--text3)}
.tc-name{font-size:11px;font-weight:600;color:var(--text2);line-height:1.3;word-break:break-word}

/* ══════════════ DETAIL ══════════════ */
#vDetail{background:var(--bg);padding-bottom:72px}
.det-hd{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;background:rgba(6,10,18,.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
#detCrest{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.det-name{font-family:var(--display);font-size:18px;letter-spacing:1.5px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.live-pill{display:flex;align-items:center;gap:4px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.28);padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;color:#f87171;letter-spacing:.5px;flex-shrink:0}
.lpulse{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 1.4s infinite}

/* Pages */
.page{display:none;position:relative;z-index:1}.page.active{display:block}

/* Bottom nav */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(6,10,18,.95);backdrop-filter:blur(14px);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 7px;font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text3);background:none;border:none;cursor:pointer;transition:color .18s;text-transform:uppercase}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-btn.active{color:var(--gold)}

/* Section head */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.sec-title{font-family:var(--display);font-size:18px;letter-spacing:2px;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:16px;background:linear-gradient(180deg,var(--gold),var(--dif));border-radius:2px}
.see-all{font-size:11px;color:var(--dif2);font-weight:600;background:none;border:none;cursor:pointer;letter-spacing:.4px;text-transform:uppercase}

/* Hero */
.hero{margin:12px;border-radius:var(--r);overflow:hidden;background:linear-gradient(145deg,#0A1628,#0D2040 50%,#0A1628);border:1px solid rgba(0,102,204,.22);position:relative}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0,rgba(0,61,122,.38) 0%,transparent 65%);pointer-events:none}
.hero-live-bar{background:#ef4444;color:#fff;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;display:flex;align-items:center;justify-content:center;gap:8px}
.hlive-score{font-family:var(--mono);font-size:16px;background:rgba(0,0,0,.2);padding:2px 10px;border-radius:4px}
.hero-split{display:grid;grid-template-columns:1fr 1fr;min-height:122px;position:relative;z-index:1}
.hteam{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px 12px;position:relative}
.hteam.home{background:linear-gradient(135deg,rgba(0,28,54,.85),rgba(0,45,90,.6))}
.hteam.home::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--dif2)}
.hteam.away{background:rgba(255,255,255,.025)}
.h-vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;background:var(--bg2);border:2px solid var(--border2);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:12px;letter-spacing:1px;color:var(--text3)}
.h-logo{width:55px;height:55px;display:flex;align-items:center;justify-content:center}
.h-logo img{width:55px;height:55px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.h-ini{font-family:var(--display);font-size:18px;color:rgba(255,255,255,.35)}
.h-name{font-size:12px;font-weight:700;color:#fff;text-align:center;line-height:1.2}
.hteam.away .h-name{color:rgba(255,255,255,.62)}
.h-label{position:absolute;top:8px;left:8px;background:var(--dif);color:#fff;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 7px;border-radius:4px}
.h-comp{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.07);color:var(--text3);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 7px;border-radius:4px}
.hero-meta{display:flex;border-top:1px solid var(--border);position:relative;z-index:1}
.hm-item{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 6px;font-size:11px;color:var(--text3);font-weight:500;border-right:1px solid var(--border)}
.hm-item:last-child{border-right:none}
.hm-item svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;opacity:.55}

/* Results */
.res-wrap{margin:0 12px;background:rgba(255,255,255,.02);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.res-row{display:flex;flex-direction:column;padding:2px 0}
.rc{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.rc:last-child{border-bottom:none}
.rc-dot-wrap{width:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rc-dot{width:8px;height:8px;border-radius:50%}
.rc.win .rc-dot{background:var(--green);box-shadow:0 0 7px rgba(16,185,129,.45)}
.rc.loss .rc-dot{background:#f87171;box-shadow:0 0 7px rgba(239,68,68,.35)}
.rc.draw .rc-dot{background:var(--text3)}
.rc-mid{flex:1;display:flex;align-items:center;gap:5px;min-width:0}
.rc-side{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.rc-side.r{flex-direction:row-reverse}
.rc-li{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.rc-ini{width:22px;height:22px;border-radius:3px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:var(--text3);flex-shrink:0}
.rc-tn{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.rc-tn.bold{color:var(--text);font-weight:700}
.rc-sc-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:48px}
.rc-sc{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-1px;line-height:1}
.rc.win .rc-sc{color:var(--green)}.rc.loss .rc-sc{color:#f87171}
.rc-cmp{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.rc-dt{width:42px;flex-shrink:0;font-size:10px;color:var(--text3);text-align:right;padding-right:10px;font-family:var(--mono)}

/* Standings */
.tbl-wrap{margin:0 12px;background:rgba(255,255,255,.02);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 7px;font-size:9px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);text-align:center;text-transform:uppercase;letter-spacing:.6px;background:rgba(255,255,255,.018)}
.tbl th:nth-child(2){text-align:left;padding-left:4px}
.tbl td{padding:8px 7px;border-bottom:1px solid var(--border);color:var(--text2);text-align:center}
.tbl td:nth-child(2){text-align:left;padding-left:4px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.025)}
.tbl tr.row-sel td{background:rgba(0,61,122,.14);color:var(--text);font-weight:700}
.pos{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg4);color:var(--text3)}
.pos.top{background:rgba(245,200,66,.12);color:var(--gold)}
.pos.down{background:rgba(239,68,68,.1);color:#f87171}
.pos.qual{background:rgba(251,146,60,.1);color:#fb923c}
.tcell{display:flex;align-items:center;gap:5px}
.tcell img{width:17px;height:17px;object-fit:contain;flex-shrink:0}
.tbl-legend{display:flex;gap:10px;padding:9px 12px;border-top:1px solid var(--border);flex-wrap:wrap}
.tl-item{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.tl-item::before{content:'';width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tl-eu::before{background:rgba(245,200,66,.5)}.tl-q::before{background:rgba(251,146,60,.5)}.tl-d::before{background:rgba(239,68,68,.4)}

/* Match cards */
.mc-wrap{margin:10px 12px 0;background:rgba(255,255,255,.02);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.mc{border-bottom:1px solid var(--border)}
.mc:last-child{border-bottom:none}
.mc-top{display:flex;align-items:center;gap:8px;padding:9px 14px 4px}
.mc-comp{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-dt{font-size:10px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.badge{font-size:9px;font-weight:700;letter-spacing:.4px;padding:3px 7px;border-radius:5px;flex-shrink:0}
.b-ft{background:rgba(255,255,255,.07);color:var(--text3)}
.b-ns{background:rgba(0,102,204,.14);color:var(--dif2)}
.b-live{background:rgba(239,68,68,.14);color:#f87171;display:flex;align-items:center;gap:4px}
.mc-teams{display:flex;align-items:center;gap:6px;padding:4px 14px 12px}
.mc-t{flex:1;display:flex;align-items:center;gap:7px;min-width:0}
.mc-t.r{flex-direction:row-reverse}
.mc-li{width:27px;height:27px;border-radius:3px;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mc-li img{width:27px;height:27px;object-fit:contain}
.mc-li-ini{font-size:8px;font-weight:800;color:var(--text3);background:var(--bg4);width:27px;height:27px;display:flex;align-items:center;justify-content:center;border-radius:3px}
.mc-tn{font-size:13px;color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-tn.sel{color:var(--text);font-weight:700}
.mc-ctr{min-width:58px;text-align:center;flex-shrink:0}
.mc-sc{font-size:22px;font-weight:800;letter-spacing:-1px;font-family:var(--mono)}
.mc-sc.win{color:var(--green)}.mc-sc.loss{color:#f87171}.mc-sc.draw{color:var(--text2)}
.mc-up-time{display:block;font-size:17px;font-weight:700;font-family:var(--mono)}
.mc-up-soon{font-size:10px;color:var(--gold);font-weight:600;margin-top:2px}

/* Match tabs */
.tab-bar{display:flex;gap:8px;padding:12px 12px 0}
.tab-btn{flex:1;padding:9px 0;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text3);cursor:pointer;transition:all .18s}
.tab-btn.active{background:rgba(0,61,122,.22);border-color:rgba(0,102,204,.38);color:var(--dif2)}

/* Squad */
.sq-bar{display:flex;gap:6px;padding:12px 12px 0;overflow-x:auto;scrollbar-width:none}
.sq-bar::-webkit-scrollbar{display:none}
.sq-chip{flex-shrink:0;padding:6px 14px;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;color:var(--text3);cursor:pointer;transition:all .18s}
.sq-chip.active{background:rgba(0,61,122,.22);border-color:rgba(0,102,204,.38);color:var(--dif2)}
.pos-label{font-family:var(--display);font-size:14px;letter-spacing:1.5px;color:var(--text3);padding:14px 14px 6px;display:flex;align-items:center;gap:6px}
.pos-label::before{content:'';width:14px;height:1px;background:var(--border2)}
.pl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px 12px}
.pl-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r2);padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative}
.pl-card:hover{background:rgba(255,255,255,.05)}
.fav-btn{position:absolute;top:7px;right:7px;font-size:14px;color:var(--text3);background:none;border:none;cursor:pointer;transition:color .18s}
.fav-btn.on{color:var(--gold)}
.pl-img{width:50px;height:50px;border-radius:50%;overflow:hidden;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;background:var(--bg4)}
.pl-img img{width:50px;height:50px;object-fit:cover}
.pl-ini{font-family:var(--display);font-size:18px;color:var(--text3)}
.pl-num{font-family:var(--mono);font-size:10px;color:var(--text3)}
.pl-name{font-size:11px;font-weight:600;color:var(--text);text-align:center;line-height:1.3}
.pl-pos{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.pl-nat{font-size:9px;color:var(--text3)}

/* News */
.news-wrap{margin:0 12px 12px;background:rgba(255,255,255,.02);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.nw-dg{padding:8px 14px 5px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.nw-dlabel{font-family:var(--display);font-size:13px;letter-spacing:1.5px;color:var(--text2)}
.nw-dcnt{font-size:9px;color:var(--text3);background:rgba(255,255,255,.055);padding:2px 7px;border-radius:10px;font-weight:700}
.ni{display:flex;align-items:flex-start;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.ni:last-child{border-bottom:none}
.ni-tl{width:48px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:13px;position:relative}
.ni-tl::before{content:'';position:absolute;top:0;bottom:0;left:23px;width:1px;background:var(--border);z-index:0}
.ni-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);border:2px solid var(--bg2);position:relative;z-index:1;transition:background .15s;flex-shrink:0}
.ni.expanded .ni-dot{background:var(--gold);box-shadow:0 0 0 3px rgba(245,200,66,.18)}
.ni-time{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;text-align:center;line-height:1.2}
.ni-body{flex:1;min-width:0;padding:12px 14px 12px 0}
.ni-src{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.ni-ico{width:14px;height:14px;border-radius:3px;overflow:hidden;flex-shrink:0;background:var(--bg4)}
.ni-ico img{width:14px;height:14px;object-fit:cover}
.ni-sn{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ni h4{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ni-chev{color:var(--text3);font-size:16px;flex-shrink:0;transition:transform .2s;padding:13px 12px 0 0;align-self:flex-start}
.ni.expanded .ni-chev{transform:rotate(90deg);color:var(--gold)}
.ni-drawer{display:none;padding:0 14px 14px 48px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.18)}
.ni-drawer.open{display:block;animation:fadeIn .18s ease}
.ni-drawer-in{border-left:2px solid var(--gold);padding-left:12px}
.ni-drawer-in p{font-size:13px;color:var(--text2);line-height:1.7;margin:0 0 12px}
.ni-read{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#fff;background:var(--dif);padding:7px 14px;border-radius:20px;text-decoration:none;transition:background .15s}
.ni-read:hover{background:var(--dif2)}
.ni-more{width:100%;padding:11px;border:none;background:transparent;color:var(--dif2);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border-top:1px solid var(--border)}
.ni-more:hover{background:rgba(255,255,255,.025)}
.ni-more svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.ni-hidden{display:none}

/* API key notice */
.api-notice{margin:12px;padding:14px 16px;background:rgba(245,200,66,.05);border:1px solid rgba(245,200,66,.2);border-radius:var(--r);font-size:12px;color:rgba(245,200,66,.75);line-height:1.6}
.api-notice strong{color:var(--gold);font-weight:700}
.api-notice a{color:var(--gold)}
.api-notice code{font-family:var(--mono);font-size:11px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:3px}

/* ── Team search ── */
.teams-search-wrap{position:relative;margin:12px 14px 6px;flex-shrink:0}
.teams-search{width:100%;padding:10px 36px 10px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .18s}
.teams-search::placeholder{color:var(--text3)}
.teams-search:focus{border-color:var(--dif2);background:rgba(0,102,204,.07)}
.ts-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.5}

/* ── Sort table ── */
.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.sortable:hover{color:var(--text2)!important}
.tbl-active{color:var(--gold)!important}
.sort-icon{font-size:9px;opacity:.7;margin-left:1px}

/* ── Rate limit badge ── */
.rl-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 7px;border-radius:10px;background:rgba(255,255,255,.07);color:var(--text3);letter-spacing:.3px;flex-shrink:0}
.rl-badge.ok{color:var(--green)}
.rl-badge.warn{color:var(--gold)}
.rl-badge.danger{color:#f87171;background:rgba(239,68,68,.12)}

/* ── Error state ── */
.err-box{margin:12px;padding:16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);border-radius:var(--r);font-size:13px;color:rgba(239,68,68,.85);line-height:1.6}
.err-box strong{color:#f87171;display:block;margin-bottom:4px;font-size:14px}
.err-box .err-retry{display:inline-block;margin-top:10px;padding:7px 16px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.25);border-radius:20px;color:#f87171;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.err-box .err-retry:hover{background:rgba(239,68,68,.25)}

/* ── Loading overlay for hero ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--dif2);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}

@media(min-width:500px){body,.bot-nav{max-width:500px}}
</style>
</head>

// ── UTILS ─────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function set(id,html){const e=$(id);if(e)e.innerHTML=html;}
function ini(s){return(s||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function fd(s){try{return new Date(s).toLocaleDateString('sv-SE',{day:'numeric',month:'short'});}catch{return s;}}
function ft(s){try{return new Date(s).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});}catch{return '';}}
function daysUntil(d){const n=Math.ceil((new Date(d)-new Date())/(864e5));return n<=0?'Idag':n===1?'Imorgon':'Om '+n+' d';}
function stripHTML(s){return(s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();}

// ── CACHE ─────────────────────────────────────────────────
function cGet(k,ttl=180000){try{const d=JSON.parse(localStorage.getItem('c_'+k)||'null');if(!d||Date.now()-d.t>=ttl)return null;if(Array.isArray(d.v)&&!d.v.length)return null;return d.v;}catch{return null;}}
function cSet(k,v){try{if(Array.isArray(v)&&!v.length)return;localStorage.setItem('c_'+k,JSON.stringify({v,t:Date.now()}));}catch{}}
function cClear(k){try{localStorage.removeItem('c_'+k);}catch{}}

const FDO_OK=()=>!!FDO_KEY&&FDO_KEY.length>10;
const GNEWS_KEY='89fcd023dbe26d21c81e88176c51f8af'; // GNews API for DIF news

// ── RATE LIMITER (10 req/min free tier) ───────────────────
// Reads X-RequestsAvailable + X-RequestCounter-Reset from response headers
// Queues requests to avoid hard blocks
// ── Rate limit state (still read from Worker response headers) ──
const RL={available:10,resetIn:60};

// fdoFetch routes all calls through the Cloudflare Worker proxy:
//   browser → WORKER/fdo/* → football-data.org (server-to-server, no CORS)
// Fallback: direct FDO call (works in local dev / non-CORS environments)
async function fdoFetch(path){
  // Primary: Worker proxy (production – no CORS issues, API key server-side)
  const proxyUrl=WORKER+'/fdo'+path;
  try{
    const r=await fetch(proxyUrl);
    // Read throttle headers forwarded by Worker
    const avail=r.headers.get('X-RequestsAvailable');
    const reset=r.headers.get('X-RequestCounter-Reset');
    if(avail!=null){RL.available=parseInt(avail)||10;updateRlBadge();}
    if(reset!=null)RL.resetIn=parseInt(reset)||60;
    if(r.status===429){
      const wait=(RL.resetIn||60)*1000+500;
      console.warn('FDO 429 via proxy – waiting',Math.round(wait/1000)+'s');
      await new Promise(r=>setTimeout(r,wait));
      const r2=await fetch(proxyUrl);
      if(!r2.ok)throw new Error('FDO '+r2.status+' (retry)');
      return r2.json();
    }
    if(!r.ok){
      const body=await r.json().catch(()=>({error:'unknown'}));
      throw new Error('FDO '+(body.error||r.status));
    }
    return r.json();
  }catch(proxyErr){
    // Fallback: direct call (local development / Worker unavailable)
    console.warn('[fdoFetch] proxy failed, trying direct:',proxyErr.message);
    if(!FDO_OK())throw proxyErr; // no key, no fallback
    const r=await fetch(FDO_BASE+path,{headers:{'X-Auth-Token':FDO_KEY}});
    const avail=r.headers.get('X-RequestsAvailable');
    if(avail!=null){RL.available=parseInt(avail)||10;updateRlBadge();}
    if(!r.ok)throw new Error('FDO direct '+r.status);
    return r.json();
  }
}

function fdoPos(p){
  if(!p)return'';p=p.toUpperCase();
  if(p.includes('KEEPER'))return'Goalkeeper';
  if(p.includes('BACK')||p.includes('DEFENCE')||p.includes('DEFENDER'))return'Defender';
  if(p.includes('MIDFIELD'))return'Midfielder';
  if(p.includes('FORWARD')||p.includes('WINGER')||p.includes('OFFENCE')||p.includes('ATTACKER'))return'Forward';
  return p;
}

function normFdo(m,teamId){
  if(!m?.homeTeam||!m?.awayTeam)return null;
  const isHome=m.homeTeam.id===teamId;
  const hs=m.score?.fullTime?.home??null, as=m.score?.fullTime?.away??null;
  const ds=isHome?hs:as, os=isHome?as:hs;
  const fin=m.status==='FINISHED'||m.status==='AWARDED';
  const isLive=['IN_PLAY','PAUSED','EXTRA_TIME','PENALTY_SHOOTOUT'].includes(m.status);
  let result='upcoming';
  if(fin&&ds!=null&&os!=null)result=ds>os?'win':ds<os?'loss':'draw';
  const rawDate=m.utcDate||'';
  const dObj=rawDate?new Date(rawDate):null;
  return{
    id:m.id,rawDate,
    date:dObj?dObj.toLocaleDateString('sv-SE'):'',
    time:dObj?dObj.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}):'',
    home:m.homeTeam.shortName||m.homeTeam.name||'',
    away:m.awayTeam.shortName||m.awayTeam.name||'',
    hl:m.homeTeam.crest||'',al:m.awayTeam.crest||'',
    hs,as,ds,os,isHome,
    opponent:isHome?(m.awayTeam.shortName||m.awayTeam.name||''):(m.homeTeam.shortName||m.homeTeam.name||''),
    oppLogo:isHome?(m.awayTeam.crest||''):(m.homeTeam.crest||''),
    competition:m.competition?.name||'',venue:'',
    status:fin?'FT':isLive?'LIVE':['TIMED','SCHEDULED'].includes(m.status)?'NS':'NS',result,
  };
}

async function getNextMatches(){
  const c=cGet('next');
  if(c){const f=new Date(c[0]?.date);if(f<new Date(Date.now()-7200000)){cClear('next');}else return c;}
  try{
    const j=await apiFetch(TSDB+'/eventsnext.php?id='+TSDB_ID);
    const v=(j.events||[]).map(e=>normTsdb(e)).filter(Boolean);
    const now=new Date();
    const future=v.filter(m=>new Date(m.date)>new Date(now-7200000));
    const seen=new Set(future.map(m=>m.date));
    const extra=FALLBACK_NEXT.filter(m=>!seen.has(m.date)&&new Date(m.date)>now);
    const merged=[...future,...extra].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,8);
    if(merged.length){cSet('next',merged);return merged;}
  }catch(e){console.warn(e.message);}
  return FALLBACK_NEXT.filter(m=>new Date(m.date)>new Date());
}

async function getNews(){
  let arch=[];try{arch=JSON.parse(localStorage.getItem('dif_news_archive')||'[]');}catch{}

  // Source 1: Cloudflare Worker proxy (Google News RSS / GNews)
  let fresh=[];
  try{
    const j=await apiFetch(WORKER+'/news');
    fresh=(j.items||[]).filter(n=>n?.title);
  }catch(e){console.warn('[Worker news]',e.message);}

  // Source 2: GNews API direct (if Worker failed or returned empty)
  if(!fresh.length&&GNEWS_KEY){
    try{
      const url=`https://gnews.io/api/v4/search?q=Djurg%C3%A5rdens+IF&lang=sv&country=se&max=10&apikey=${GNEWS_KEY}`;
      const j=await apiFetch(url);
      fresh=(j.articles||[]).map(a=>({
        title:a.title,
        link:a.url,
        date:a.publishedAt,
        summary:a.description||'',
        sname:a.source?.name||'',
        fav:a.source?.url?`https://www.google.com/s2/favicons?domain=${new URL(a.source.url).hostname}&sz=32`:'',
      })).filter(n=>n.title);
    }catch(e){console.warn('[GNews direct]',e.message);}
  }

  // Use archive if all live sources failed
  if(!fresh.length&&arch.length)return arch;
  if(!fresh.length)return[];

  // Merge fresh with archive (deduplicate on title prefix)
  const seen=new Set(fresh.map(n=>n.title.slice(0,50).toLowerCase()));
  const old=arch.filter(n=>!seen.has(n.title.slice(0,50).toLowerCase()));
  const merged=[...fresh,...old].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).slice(0,100);
  try{localStorage.setItem('dif_news_archive',JSON.stringify(merged));}catch{}
  return merged;
}

const DIF_NAMES=['Djurgårdens IF','Djurgarden','DIF','Djurgårdens IF Fotboll'];
function normTsdb(e){
  const isHome=e.idHomeTeam===TSDB_ID||DIF_NAMES.includes(e.strHomeTeam);
  const isDIF=isHome||DIF_NAMES.includes(e.strAwayTeam);
  if(!isDIF)return null;
  const hs=e.intHomeScore!=null?+e.intHomeScore:null, as=e.intAwayScore!=null?+e.intAwayScore:null;
  const ds=isHome?hs:as, os=isHome?as:hs;
  let result='upcoming';
  if(ds!=null&&os!=null)result=ds>os?'win':ds<os?'loss':'draw';
  const live=['In Progress','HT','Live','1H','2H','ET','PEN'];
  const isLive=live.some(x=>e.strStatus?.includes(x));
  return{
    id:e.idEvent,rawDate:e.dateEvent,date:e.dateEvent,
    time:(e.strTime||'').slice(0,5),
    home:e.strHomeTeam,away:e.strAwayTeam,
    hl:e.strHomeTeamBadge||sweLogoFor(e.strHomeTeam)||'',
    al:e.strAwayTeamBadge||sweLogoFor(e.strAwayTeam)||'',
    hs,as,ds,os,isHome,
    opponent:isHome?e.strAwayTeam:e.strHomeTeam,
    oppLogo:'',competition:e.strLeague||'',venue:e.strVenue||'',
    status:e.strStatus==='Match Finished'?'FT':isLive?'LIVE':'NS',result,
  };
}

async function loadDifHome(){
  S.last=S.last.length?S.last:FALLBACK_LAST;
  S.next=S.next.length?S.next:FALLBACK_NEXT;
  set('homeHero',renderHero(S.next[0]));
  set('homeResults',renderResultChips(S.last.slice(0,5)));
  set('homeNews','<div style="padding:14px 16px"><div class="sk sk-t" style="width:80%"></div></div>');
  set('homeTable','<div style="padding:1rem 14px"><div class="sk sk-t" style="width:50%"></div></div>');

    if(l.length){S.last=l;set('homeResults',renderResultChips(l.slice(0,5)));}
    if(n.length){S.next=n;set('homeHero',renderHero(n[0]));}}catch{}
  try{const news=await getNews();S.news=news;set('homeNews',renderNews(news.slice(0,15)));}
  catch{set('homeNews','<div class="empty">Nyheter ej tillgängliga</div>');}
  try{const t=await getStandings();S.standings=t;set('homeTable',renderStandings(t));}catch{}
}

async function loadMatches(){
  if(!S.team)return;
  // Show skeleton while loading
  if(!S.last.length&&!S.next.length){
    set('matchesList','<div style="padding:12px">'+Array(4).fill('<div class="sk sk-t" style="margin-bottom:14px"></div>').join('')+'</div>');
  }else{
    renderMatchesView(); // show cached data instantly
  }
  try{
    if(S.team.source==='fdo'){
      const l=await fdoLast(S.team.id);
      const n=await fdoNext(S.team.id);
      if(l.length)S.last=l;if(n.length)S.next=n;
    }else{
      const[l,n]=await Promise.all([getLastMatches(),getNextMatches()]);
      if(l.length)S.last=l;if(n.length)S.next=n;
    }
    renderMatchesView();
  }catch(e){
    console.warn('[loadMatches]',e.message);
    if(!S.last.length&&!S.next.length)
      set('matchesList',fdoErrBox('Matcher',e));
    else
      renderMatchesView(); // show whatever we have
  }
}

function renderMatchesView(){
  const list=S.matchTab==='upcoming'?S.next:S.last;
  set('matchesList',list.length?list.map(renderMatchCard).join(''):`<div class="empty">Inga ${S.matchTab==='upcoming'?'kommande':'spelade'} matcher</div>`);
}
function switchTab(t,el){
  S.matchTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderMatchesView();
}

async function loadSquad(){
  if(!S.team)return;
  if(S.squad.length){renderSquadView(S.squad,S.sqFilter);return;}
  set('squadGrid','<div class="pl-grid">'+Array(9).fill('<div class="sk sk-b" style="height:130px;border-radius:8px"></div>').join('')+'</div>');
  try{
    S.squad=S.team.source==='fdo'?await fdoSquad(S.team.id):await getSquad();
    if(!S.squad.length)throw new Error('Truppen är tom (API returnerade inga spelare)');
    renderSquadView(S.squad,S.sqFilter);
  }catch(e){
    console.warn('[loadSquad]',e.message);
    set('squadGrid',fdoErrBox('Spelartrupp',e));
  }
}

function renderSquadView(players,f){
  S.sqFilter=f;
  document.querySelectorAll('.sq-chip').forEach(c=>c.classList.toggle('active',c.getAttribute('onclick')?.includes("'"+f+"'")));
  const filt=f==='all'?players:players.filter(p=>p.pos?.includes(f));
  if(f==='all'){
    const g={Goalkeeper:[],Defender:[],Midfielder:[],Forward:[]};
    filt.forEach(p=>{const k=Object.keys(g).find(k=>p.pos?.includes(k));if(k)g[k].push(p);});
    const lb={Goalkeeper:'Målvakter',Defender:'Backar',Midfielder:'Mittfältare',Forward:'Forwards'};
    set('squadGrid',Object.entries(g).filter(([,v])=>v.length).map(([k,v])=>
      `<div class="pos-label">${lb[k]} (${v.length})</div><div class="pl-grid">${v.map(renderPlayer).join('')}</div>`).join(''));
  }else set('squadGrid',`<div class="pl-grid">${filt.map(renderPlayer).join('')}</div>`);
}
function filterSquad(f,el){renderSquadView(S.squad.length?S.squad:[],f);if(!S.squad.length)loadSquad();}

async function loadStandings(){
  if(!S.team)return;
  if(S.standings.length){set('standingsFull',renderStandings(S.standings));return;}
  set('standingsFull','<div style="padding:14px">'+Array(8).fill('<div class="sk sk-t" style="margin-bottom:10px"></div>').join('')+'</div>');
  try{
    const t=S.team.source==='fdo'?await fdoStandings(S.team.leagueCode):await getStandings();
    if(!t.length)throw new Error('Tom tabell från API');
    S.standings=t;set('standingsFull',renderStandings(t));
  }catch(e){
    console.warn('[loadStandings]',e.message);
    if(S.standings.length)set('standingsFull',renderStandings(S.standings));
    else set('standingsFull',fdoErrBox('Tabell',e));
  }
}

function renderStandings(table,limit=999){
  if(!table?.length)return'<div class="empty">Tabell ej tillgänglig</div>';
  const selId=S.team?.id;
  const selName=(S.team?.name||'').toLowerCase();
  const rows=table.slice(0,limit).map((t,i)=>{
    const p=+t.intRank||i+1;
    const pc=p<=3?'top':p>=15?'down':p>=14?'qual':'';
    const badge=t.strTeamBadge?`<img src="${t.strTeamBadge}" loading="lazy" onerror="this.style.display='none'" alt="">`:''
    const isSel=(t.teamId&&t.teamId===selId)||/djurgård/i.test(t.strTeam)||
      selName.includes((t.strTeam||'').toLowerCase())||(t.strTeam||'').toLowerCase().includes(selName);
    return`<tr class="${isSel?'row-sel':''}">
      <td><span class="pos ${pc}">${p}</span></td>
      <td><div class="tcell">${badge}<span>${isSel?`<strong>${t.strTeam}</strong>`:t.strTeam}</span></div></td>
      <td>${t.intPlayed||0}</td>
      <td>${t.intWin||0}</td><td>${t.intDraw||0}</td><td>${t.intLoss||0}</td>
      <td><strong>${t.intPoints||0}</strong></td>
    </tr>`;
  }).join('');
  return`<table class="tbl" id="standingsTbl">
    <thead><tr>
      <th>#</th>
      <th onclick="sortTable('name')" class="sortable">Lag <span class="sort-icon">⇅</span></th>
      <th onclick="sortTable('played')" class="sortable">M <span class="sort-icon">⇅</span></th>
      <th onclick="sortTable('win')" class="sortable">V <span class="sort-icon">⇅</span></th>
      <th onclick="sortTable('draw')" class="sortable">O <span class="sort-icon">⇅</span></th>
      <th onclick="sortTable('loss')" class="sortable">F <span class="sort-icon">⇅</span></th>

}

// ── News ──────────────────────────────────────────────────
let _no=null;const NPS=5;
function parseNewsDate(s){const d=new Date(s);return isNaN(d)?null:d;}
function fmtNTime(s){const d=parseNewsDate(s);return d?d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}):''}
function fmtNDate(s){const d=parseNewsDate(s);if(!d)return'Idag';const t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);if(d.toDateString()===t.toDateString())return'Idag';if(d.toDateString()===y.toDateString())return'Igår';return d.toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long'});}

function renderNews(items){
  if(!items?.length)return'<div class="empty">Inga nyheter</div>';
  const g={},tk=new Date().toDateString();
  items.forEach((n,i)=>{const d=parseNewsDate(n.date);const k=d?d.toDateString():tk;if(!g[k])g[k]={label:fmtNDate(n.date),items:[],ts:d?d.getTime():Date.now()};g[k].items.push({n,i});});
  return Object.values(g).sort((a,b)=>b.ts-a.ts).map((grp,gi)=>{
    const gid='ng'+gi;const vis=grp.items.slice(0,NPS);const hid=grp.items.slice(NPS);
    return`<div class="nw-dg"><span class="nw-dlabel">${grp.label}</span><span class="nw-dcnt">${grp.items.length}</span></div>
    ${vis.map(({n,i})=>renderNItem(n,i)).join('')}
    ${hid.length?`<div id="${gid}-h" class="ni-hidden">${hid.map(({n,i})=>renderNItem(n,i)).join('')}</div>
    <button class="ni-more" onclick="showMoreN('${gid}')"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>Visa ${hid.length} till</button>`:''}`;
  }).join('');
}
function showMoreN(g){const h=$(g+'-h'),b=document.querySelector(`[onclick="showMoreN('${g}')"]`);if(h)h.classList.remove('ni-hidden');if(b)b.remove();}
function renderNItem(n,i){
  if(!n?.title)return'';
  const id='ni'+i;
  const sum=stripHTML(n.summary||n.description||'').slice(0,280);
  const hd=sum.length>20;
  return`<div class="ni" id="${id}" onclick="toggleN('${id}','${(n.link||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}',${hd})">
    <div class="ni-tl"><div class="ni-dot"></div><div class="ni-time">${fmtNTime(n.date)}</div></div>
    <div class="ni-body">
      <div class="ni-src">
        <div class="ni-ico">${n.fav?`<img src="${n.fav}" loading="lazy" alt="">`:''}</div>
        <span class="ni-sn">${n.sname||''}</span>
      </div>
      <h4>${stripHTML(n.title)}</h4>
    </div>
    <span class="ni-chev">${hd?'›':''}</span>
  </div>${hd?`<div class="ni-drawer" id="${id}d"><div class="ni-drawer-in"><p>${sum}${sum.length>=280?'…':''}</p><a class="ni-read" href="${n.link||'#'}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Läs hela artikeln ↗</a></div></div>`:''}`;
}
function toggleN(id,link,hd){
  if(!hd){window.open(link,'_blank','noopener');return;}
  const el=$(id),dr=$(id+'d');if(!el||!dr)return;
  const open=dr.classList.contains('open');
  if(_no&&_no!==id){const p=$(_no),pd=$(_no+'d');if(p)p.classList.remove('expanded');if(pd)pd.classList.remove('open');}
  el.classList.toggle('expanded',!open);dr.classList.toggle('open',!open);_no=!open?id:null;
  if(!open)setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

// SORT TABLE
// ══════════════════════════════════════════════════════════
const _sort={key:'points',asc:false};
function sortTable(key){
  if(_sort.key===key){_sort.asc=!_sort.asc;}else{_sort.key=key;_sort.asc=false;}
  if(!S.standings.length)return;
  const sorted=[...S.standings].sort((a,b)=>{
    const map={name:'strTeam',played:'intPlayed',win:'intWin',draw:'intDraw',loss:'intLoss',points:'intPoints'};
    const field=map[key]||'intPoints';
    const av=field==='strTeam'?(a[field]||''):(+a[field]||0);
    const bv=field==='strTeam'?(b[field]||''):(+b[field]||0);
    if(field==='strTeam')return _sort.asc?av.localeCompare(bv):bv.localeCompare(av);
    return _sort.asc?av-bv:bv-av;
  });
  // Re-render both standings containers
  const html=renderStandings(sorted);
  const sf=$('standingsFull'),ht=$('homeTable');
  if(sf)sf.innerHTML=html;if(ht)ht.innerHTML=html;
  // Update header highlight
  document.querySelectorAll('.tbl th').forEach(th=>{
    th.classList.remove('tbl-active');
    const si=th.querySelector('.sort-icon');if(si)si.textContent='⇅';
  });
  document.querySelectorAll('.tbl th').forEach(th=>{
    if(th.getAttribute('onclick')===`sortTable('${key}')`){
      th.classList.add('tbl-active');
      const si=th.querySelector('.sort-icon');if(si)si.textContent=_sort.asc?'↑':'↓';
    }
  });
}

// ══════════════════════════════════════════════════════════
// ROUTING – history.pushState + popstate
// ══════════════════════════════════════════════════════════
function initRouting(){
  // Set initial history state
  history.replaceState({view:'landing'},'',location.href);

  window.addEventListener('popstate',e=>{
    const st=e.state;
    if(!st){showViewById('vLanding');return;}
    const v=st.view||'landing';
    // Reset loaded data when going back to fresh state
    if(v==='landing'){
      S.last=[];S.next=[];S.standings=[];S.squad=[];S.news=[];
      showViewById('vLanding');
    } else if(v==='teams'){
      // Restore teams view for the correct league
      S.last=[];S.next=[];S.standings=[];S.squad=[];S.news=[];
      showViewById('vTeams');
      // Restore league data if possible
      if(st.code&&S.league?.code!==st.code){
        const lg=LEAGUES.find(l=>l.code===st.code);
        if(lg){
          S.league=lg;
          set('teamLeagueName',lg.name);set('teamFlag',lg.flag);
        }
      }
    } else if(v==='detail'){
      // If same team still in state, just restore the tab
      if(st.teamId&&S.team?.id===parseInt(st.teamId)){
        const tab=st.tab||'home';
        // Just switch tab without reloading
        document.querySelectorAll('#pg-home,#pg-matches,#pg-squad,#pg-standings').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('#bn-home,#bn-matches,#bn-squad,#bn-standings').forEach(b=>b.classList.remove('active'));
        const pg=$('pg-'+tab),bn=$('bn-'+tab);
        if(pg)pg.classList.add('active');if(bn)bn.classList.add('active');
        S.tab=tab;
        showViewById('vDetail');
      } else {
        // Different team in history – reload from state if possible
        if(st.teamId&&st.teamName){
          S.team={id:parseInt(st.teamId),name:st.teamName,crest:st.crest||'',source:'fdo',leagueCode:st.leagueCode||''};
          S.last=[];S.next=[];S.standings=[];S.squad=[];S.news=[];
          S.tab='home';S.matchTab='upcoming';S.sqFilter='all';
          openDetail();
        }
      }
    }
  });
}
