<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#002B50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Djurgårdens IF – Matcher, trupp och tabell Allsvenskan 2026">
  <title>Djurgårdens IF</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<!-- Pull to refresh indicator -->
<div id="ptr-indicator" aria-hidden="true">↻</div>

<!-- ── APP HEADER ───────────────────────────────────────── -->
<header class="app-header" role="banner">
  <div class="header-logo">
    <div class="header-badge" aria-hidden="true">
      <span>DIF</span>
      <span>1891</span>
    </div>
    <span class="header-title">Djurgårdens IF</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="dark-btn" onclick="__toggleDark()" aria-label="Byt tema">☀️</button>
  </div>
</header>

<!-- Desktop top nav (hidden on mobile) -->
<nav class="desktop-nav" style="display:none" aria-label="Huvudnavigation">
  <button class="nav-item active" data-tab="home" aria-label="Hem">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Hem
  </button>
  <button class="nav-item" data-tab="matches" aria-label="Matcher">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20"/><path d="M2 12h20"/></svg>
    Matcher
  </button>
  <button class="nav-item" data-tab="squad" aria-label="Trupp">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    Trupp
  </button>
  <button class="nav-item" data-tab="standings" aria-label="Tabell">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Tabell
  </button>
</nav>

<!-- ── PAGES ─────────────────────────────────────────────── -->
<main id="main" role="main">

  <!-- HOME -->
  <div id="page-home" class="page active" role="tabpanel" aria-label="Hem">
    <div class="page-inner">
      <div>
        <!-- Next match hero -->
        <div id="home-next" aria-label="Nästa match"></div>

        <!-- Last results -->
        <section class="section" aria-labelledby="results-heading">
          <div class="section-header">
            <h2 class="section-title" id="results-heading">Senaste</h2>
            <button class="see-all" onclick="__showPage('matches')" aria-label="Se alla matcher">Se alla</button>
          </div>
        </section>
        <div id="home-results" class="results-scroll" role="list" aria-label="Senaste resultat"></div>

        <!-- News -->
        <section class="section" aria-labelledby="news-heading">
          <div class="section-header">
            <h2 class="section-title" id="news-heading">Nyheter</h2>
          </div>
          <div class="card-block" style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden">
            <div id="home-news" role="list" aria-label="Nyheter"></div>
          </div>
        </section>
      </div>

      <!-- Desktop sidebar -->
      <div class="sidebar-col">
        <section aria-labelledby="table-home-heading">
          <div class="section-header" style="padding:1rem 0 .75rem">
            <h2 class="section-title" id="table-home-heading">Tabell</h2>
            <button class="see-all" onclick="__showPage('standings')">Fullständig</button>
          </div>
          <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden">
            <div id="home-standings-table">
              <div class="empty-state">Laddar tabell...</div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- MATCHES -->
  <div id="page-matches" class="page" role="tabpanel" aria-label="Matcher">
    <div class="page-inner page-inner--full">
      <!-- Tab switcher -->
      <div class="filter-scroll" role="tablist" aria-label="Matchtyp">
        <button class="filter-chip match-tab-btn active" data-filter="upcoming"
          onclick="__setMatchTab('upcoming', this)" role="tab" aria-selected="true">
          Kommande
        </button>
        <button class="filter-chip match-tab-btn" data-filter="results"
          onclick="__setMatchTab('results', this)" role="tab" aria-selected="false">
          Resultat
        </button>
      </div>
      <div id="matches-list" class="card-list" role="list" aria-label="Matcher"></div>
    </div>
  </div>

  <!-- SQUAD -->
  <div id="page-squad" class="page" role="tabpanel" aria-label="Trupp">
    <div class="page-inner page-inner--full">
      <!-- Position filter -->
      <div class="filter-scroll" role="group" aria-label="Filtrera position">
        <button class="filter-chip active" data-filter="all"
          onclick="__filterSquad('all', this)">Alla</button>
        <button class="filter-chip" data-filter="Goalkeeper"
          onclick="__filterSquad('Goalkeeper', this)">Målvakter</button>
        <button class="filter-chip" data-filter="Defender"
          onclick="__filterSquad('Defender', this)">Backar</button>
        <button class="filter-chip" data-filter="Midfielder"
          onclick="__filterSquad('Midfielder', this)">Mittfält</button>
        <button class="filter-chip" data-filter="Forward"
          onclick="__filterSquad('Forward', this)">Forwards</button>
      </div>
      <div id="squad-grid" role="list" aria-label="Spelartrupp"></div>
    </div>
  </div>

  <!-- STANDINGS -->
  <div id="page-standings" class="page" role="tabpanel" aria-label="Tabell">
    <div class="page-inner page-inner--full">
      <section aria-labelledby="standings-heading">
        <div class="section-header" style="padding:1rem 1rem .75rem">
          <h2 class="section-title" id="standings-heading">Allsvenskan 2026</h2>
        </div>
        <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin:0 1rem">
          <div id="standings-table" aria-label="Tabellställning"></div>
        </div>
      </section>
    </div>
  </div>

</main>

<!-- ── BOTTOM NAV (mobile) ────────────────────────────────── -->
<nav class="bottom-nav" role="navigation" aria-label="Bottenmeny">
  <button class="nav-item active" data-tab="home" aria-label="Hem" aria-selected="true">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Hem
  </button>
  <button class="nav-item" data-tab="matches" aria-label="Matcher" aria-selected="false">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20"/><path d="M2 12h20"/></svg>
    Matcher
  </button>
  <button class="nav-item" data-tab="squad" aria-label="Trupp" aria-selected="false">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    Trupp
  </button>
  <button class="nav-item" data-tab="standings" aria-label="Tabell" aria-selected="false">
    <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Tabell
  </button>
</nav>

<script type="module" src="app.js"></script>

<!-- Preload standings into home sidebar -->
<script type="module">
import { fetchStandings } from './services/api.js';
import { renderStandingsTable } from './components/ui.js';
setTimeout(async () => {
  try {
    const table = await fetchStandings();
    const el = document.getElementById('home-standings-table');
    if (el) el.innerHTML = renderStandingsTable(table.slice ? table.slice(0,10) : table);
  } catch(e) {}
}, 500);
</script>

</body>
</html>
